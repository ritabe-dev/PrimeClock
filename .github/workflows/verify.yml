name: Verify PrimeClock candidates and public bundle

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly candidate slow gate: Sunday 18:20 UTC = Monday 03:20 JST.
    - cron: "20 18 * * 0"

jobs:
  v2_2_public:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install research package
        working-directory: research
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Run focused public tests
        working-directory: research
        run: python -m pytest tests/test_covering_prime_prefix_filtration.py -q
      - name: Run package verifier
        working-directory: research
        run: |
          python -m prime_reciprocal_projection.cli covering-prime-prefix-verify-certificates \
            --out data/summaries/prc_prime_prefix_certificate_verification_v1_7.csv
      - name: Run standalone public checker
        working-directory: research
        run: |
          python certificates/check_prime_prefix_c4_b5.py \
            --out data/summaries/prc_prime_prefix_certificate_standalone_verification_v1_8.csv
      - name: Check release hashes
        run: python scripts/check_release_versions.py
      - name: Build and inspect release bundle
        run: python scripts/verify_public_release.py --out "$RUNNER_TEMP/primeclock-public-release" --zip

  v2_3_candidate_quick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install research package
        working-directory: research
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Run candidate quick gate
        run: |
          /usr/bin/time -p python scripts/verify_candidate_workflow.py \
            --config research/experiments/critical_radius_birth_dynamics/candidate_workflow_v0_1.yml \
            quick
      - name: Run candidate process hygiene gate
        run: |
          python scripts/verify_candidate_workflow.py \
            --config research/experiments/critical_radius_birth_dynamics/candidate_workflow_v0_1.yml \
            process-hygiene

  v2_3_candidate_bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install research package
        working-directory: research
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Check candidate artifacts and manifests
        run: |
          python scripts/verify_candidate_workflow.py \
            --config research/experiments/critical_radius_birth_dynamics/candidate_workflow_v0_1.yml \
            artifact-freshness
          python scripts/verify_candidate_workflow.py \
            --config research/experiments/critical_radius_birth_dynamics/candidate_workflow_v0_1.yml \
            manifest-consistency
      - name: Run candidate bundle gate
        run: |
          /usr/bin/time -p python scripts/verify_candidate_workflow.py \
            --config research/experiments/critical_radius_birth_dynamics/candidate_workflow_v0_1.yml \
            bundle

  v2_3_candidate_slow:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install research package
        working-directory: research
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Run candidate slow gate
        run: |
          /usr/bin/time -p python scripts/verify_candidate_workflow.py \
            --config research/experiments/critical_radius_birth_dynamics/candidate_workflow_v0_1.yml \
            slow

  v2_3_candidate_promotion_readiness:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install research package
        working-directory: research
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Run all candidate gates
        run: |
          /usr/bin/time -p python scripts/verify_candidate_workflow.py \
            --config research/experiments/critical_radius_birth_dynamics/candidate_workflow_v0_1.yml \
            all \
            --report "$RUNNER_TEMP/prc-v2.3-promotion-readiness.md"
      - name: Re-run public release dry verification
        run: python scripts/verify_public_release.py --out "$RUNNER_TEMP/primeclock-public-release" --zip
      - name: Upload promotion readiness report
        uses: actions/upload-artifact@v4
        with:
          name: prc-v2.3-promotion-readiness
          path: ${{ runner.temp }}/prc-v2.3-promotion-readiness.md
