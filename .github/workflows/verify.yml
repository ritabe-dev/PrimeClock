name: Verify PrimeClock public release

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  release_doi_integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Check registered release DOI metadata
        run: python scripts/check_release_doi_integrity.py --all

  public_release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install research package
        working-directory: research
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Run v2.3.0 public tests
        working-directory: research
        run: |
          python -m pytest tests/test_critical_radius_birth_dynamics_public.py -q
      - name: Run C4/B5 public core tests
        working-directory: research
        run: |
          python -m pytest tests/test_covering_prime_prefix_filtration.py -q \
            -k "not public_release and not publish_public_release and not release_version and not finalize_release" \
            --durations=20
      - name: Run C4/B5 public release-script tests
        working-directory: research
        run: |
          python -m pytest tests/test_covering_prime_prefix_filtration.py -q \
            -k "public_release or publish_public_release or release_version or finalize_release" \
            --durations=20
      - name: Run v2.3.0 public checkers
        working-directory: research
        run: |
          python experiments/critical_radius_birth_dynamics/check_candidate.py \
            --out "$RUNNER_TEMP/prc-v2.3-helper-check.csv"
          python experiments/critical_radius_birth_dynamics/check_candidate_standalone.py \
            --out "$RUNNER_TEMP/prc-v2.3-standalone-check.csv"
      - name: Run C4/B5 public checkers
        working-directory: research
        run: |
          python -m prime_reciprocal_projection.cli covering-prime-prefix-verify-certificates \
            --out "$RUNNER_TEMP/prc_prime_prefix_certificate_verification_v1_7.csv"
          python certificates/check_prime_prefix_c4_b5.py \
            --out "$RUNNER_TEMP/prc_prime_prefix_certificate_standalone_verification_v1_8.csv"
      - name: Verify public bundle
        run: python scripts/verify_public_release.py --out "$RUNNER_TEMP/primeclock-public-release" --zip
