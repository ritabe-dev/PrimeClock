        expected_stdout: "check_v2_7_public_theorem_release: checks=8, failed=0"
  public-theorem-doi-integrity:
    description: v2.7.1 registry draft and DOI non-assignment checks
    commands:
      - cwd: .
        command:
          - "{python}"
          - scripts/check_release_doi_integrity.py
          - --release-id
          - v2.7.1-prc-general-q-prime-theorem
        expected_stdout: "check_release_doi_integrity: checked=1, failed=0"
  public-theorem-bundle:
    description: v2.7.1 public theorem release bundle build and self-check
    commands:
      - cwd: .
        command:
          - "{python}"
          - research/experiments/critical_radius_birth_dynamics/candidate_bundle.py
          - --profile
          - v2_7_public_theorem_release
          - --out
          - "{tmp}/primeclock-v271-public-release"
          - --zip
        expected_stdout: "candidate ZIP:"
      - cwd: .
        command:
          - "{python}"
          - research/experiments/critical_radius_birth_dynamics/candidate_bundle.py
          - --profile
          - v2_7_public_theorem_release
          - --check
          - "{tmp}/primeclock-v271-public-release/PrimeClock-v2.7.1-general-q-prime-theorem-v1.0"
        expected_stdout: "OK:"
      - cwd: "."
        command:
          - unzip
          - -t
          - "{tmp}/primeclock-v271-public-release/PrimeClock-v2.7.1-general-q-prime-theorem-v1.0.zip"
        expected_stdout: "No errors detected"
  public-theorem-review:
    description: Combined v2.7 public theorem preflight gate.
    commands: []
