id: prc_v2_3_public_candidate
status: internal_promotion_manifest
public_release: false
base_public_release: v2.2.3
candidate_goal: >
  Promote the critical-radius and birth-dynamics sandbox into a narrow v2.3
  public candidate without changing the stable v2.2.3 C4/B5 release line.
candidate_scope:
  critical_radius_layers: [4, 5]
  birth_dynamics_layers: [5, 6, 7]
  near_miss_layers: [4, 5]
  include_b8_or_larger: false
  include_asymptotic_claims: false
  include_prime_distribution_claims: false
candidate_claims:
  - C_k is the 1/2 level set of the exact critical-radius spectrum.
  - Critical radius is described by a finite weighted covering-radius max-min expression.
  - C_4 equals {2, 208} modulo 210 by the critical-radius level-set check.
  - C_5 has 36 covered residues by the critical-radius level-set check.
  - B_5, B_6, and B_7 are strict single-gap births in the checked finite data.
  - Near-miss ranking is a candidate generator, not a birth theorem.
verification:
  checker: check_candidate.py
  expected: checks=12, failed=0
  checker_scope: internal_helper_based
  output: data/prc_v2_3_candidate_verification_v0_1.csv
candidate_bundle:
  builder: candidate_bundle.py
  default_name: PrimeClock-v2.3-candidate-v0.1
  status: internal_only
promotion_blockers:
  - v2.3 public release manifest, SHA256 path, and allowlist are not yet created.
  - formal related-work citations for covering-radius terminology are not yet included.
  - standalone checker or explicit waiver is required before public release.
  - no Zenodo or GitHub release should be created from this internal manifest.
terminology_status:
  primary_term: critical radius
  weighted_covering_radius: descriptive finite max-min shorthand
