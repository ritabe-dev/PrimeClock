id: prc_v2_3_0_public_promotion
status: public_promotion_candidate
public_release: true
base_public_release: v2.2.4
candidate_goal: >
  Promote the critical-radius and gap-aperture birth-dynamics sandbox into the
  conservative v2.3.0 public DOI release without rewriting the stable v2.2.4
  tag or DOI record.
gate_p:
  question: Is this stable enough to cite?
  decision: promote to public v2.3.0
candidate_scope:
  critical_radius_layers: [4, 5]
  birth_dynamics_layers: [5, 6, 7]
  near_miss_layers: [4, 5]
  include_b8_or_larger: false
  include_asymptotic_claims: false
  include_prime_distribution_claims: false
candidate_claims:
  - C_k is the 1/2 level set of the exact critical-radius spectrum.
  - Critical radius is described by a finite weighted covering-radius max-min expression.
  - C_4 equals {2, 208} modulo 210 by the critical-radius level-set check.
  - C_5 has 36 covered residues by the critical-radius level-set check.
  - Birth lifts are counted by old residual gap-aperture windows against the next q-grid.
  - B_5, B_6, and B_7 are unique strict single-gap births in the checked finite data.
  - Near-miss ranking is a candidate generator; q-grid phase decides birth.
verification:
  helper_checker: check_candidate.py
  helper_expected: checks=13, failed=0
  helper_scope: internal_helper_based
  helper_output: data/prc_v2_3_candidate_verification_v0_1.csv
  standalone_checker: check_candidate_standalone.py
  standalone_expected: checks=10, failed=0
  standalone_scope: standard_library_definition_and_csv_audit
  standalone_output: data/prc_v2_3_candidate_standalone_verification_v0_1.csv
candidate_bundle:
  builder: candidate_bundle.py
  manifest: candidate_bundle_manifest_v0_1.json
  default_name: PrimeClock-v2.3-candidate-v0.1
  status: historical_candidate_input
future_work_excluded:
  - notes/prc_no_multigap_birth_note_v0_1.md
  - notes/prc_v2_4_residual_gap_transition_graph_idea_v0_1.md
  - v2.4 future-work notes are tracked internally but excluded from the candidate bundle.
promotion_blockers:
  - public release must use release/public config and publish_public_release.py, not the candidate workflow.
  - GitHub/Zenodo publication is allowed only after v2.3.0 doi_release dry-run output is correct.
  - v2.4 and no-multigap future-work notes remain excluded from the public release bundle.
terminology_status:
  primary_term: critical radius
  weighted_covering_radius: descriptive finite max-min shorthand
  decision_note: notes/prc_v2_3_related_work_decision_v0_1.md
