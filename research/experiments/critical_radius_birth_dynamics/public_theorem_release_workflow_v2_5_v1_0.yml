candidate_id: prc_v2_5_public_theorem_release
status: public_theorem_release_packaging
public_release: true
base_public_release: v2.3.0
github_release_tag: v2.5.0-prc-public-theorem
github_release_url: https://github.com/ritabe-dev/PrimeClock/releases/tag/v2.5.0-prc-public-theorem
zenodo_version_doi: 10.5281/zenodo.20154561
release_asset_name: PrimeClock-v2.5-public-theorem-v1.0.zip
goal: >
  Package the v2.5 B4->B5, B5->B6, and B6->B7 finite exact
  aperture-orbit separator theorem as a public release archive.
readiness:
  current_completion_percent: "100"
  reusable_workflow_percent: "99"
  estimated_slices_to_target: "0; GitHub Release and Zenodo version DOI are assigned"

gates:
  public-theorem-integrity:
    description: v2.5 public theorem finite certificate checks
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_5_public_theorem_integrity.py
        expected_stdout: "check_v2_5_public_theorem_integrity: checks=9, failed=0"
  public-theorem-doi-integrity:
    description: multi-version DOI, release, citation, and asset metadata checks
    commands:
      - cwd: .
        command:
          - "{python}"
          - scripts/check_release_doi_integrity.py
          - --release-id
          - v2.5.0-prc-public-theorem
        expected_stdout: "check_release_doi_integrity: checked=1, failed=0"
  public-theorem-bundle:
    description: v2.5 public theorem release bundle build and self-check
    commands:
      - cwd: research/experiments/critical_radius_birth_dynamics
        command:
          - "{python}"
          - candidate_bundle.py
          - --profile
          - v2_5_public_theorem_release
          - --out
          - "{tmp}/prc-v2.5-public-theorem-release"
          - --zip
        expected_stdout: "candidate package directory:"
      - cwd: research/experiments/critical_radius_birth_dynamics
        command:
          - "{python}"
          - candidate_bundle.py
          - --profile
          - v2_5_public_theorem_release
          - --check
          - "{tmp}/prc-v2.5-public-theorem-release/PrimeClock-v2.5-public-theorem-v1.0"
        expected_stdout: "OK:"
      - cwd: "{tmp}/prc-v2.5-public-theorem-release"
        command:
          - unzip
          - -t
          - PrimeClock-v2.5-public-theorem-v1.0.zip
        expected_stdout: "No errors detected"
  public-theorem-review:
    description: Combined public theorem release gate; implemented by workflow mode.
    commands: []
