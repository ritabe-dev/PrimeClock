          - experiments/critical_radius_birth_dynamics/check_v2_6_special_point_gate_r_review.py
        expected_stdout: "check_v2_6_special_point_gate_r_review: checks=7, failed=0, gate_r=continue_special_point_obstruction"
  v2-6-endpoint-distance-proof-obligation:
