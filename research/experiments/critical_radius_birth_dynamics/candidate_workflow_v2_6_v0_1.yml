candidate_id: prc_v2_6_necessary_only_proof_note
status: gate_c_candidate_local
public_release: false
base_public_release: v2.5.0-prc-public-theorem
goal: >
  Keep v2.6 as a minimal Gate C proof-note candidate. No public release, DOI,
  GitHub Release, B8 theorem,
  predictor, registry entry, or asymptotic-law claim is made here.

gates:
  v2-6-single-gap-theorem-note-draft:
    description: v2.6 necessary-only proof-note audit
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_single_gap_theorem_note_draft.py
        expected_stdout: "check_v2_6_single_gap_theorem_note_draft: checks=5, failed=0"
  v2-6-gate-c-candidate:
    description: v2.6 minimal Gate C candidate audit
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_single_gap_theorem_note_draft.py
        expected_stdout: "check_v2_6_single_gap_theorem_note_draft: checks=5, failed=0"
      - cwd: research/experiments/critical_radius_birth_dynamics
        command:
          - "{python}"
          - candidate_bundle.py
          - --profile
          - v2_6_gate_c_candidate
          - --out
          - "{tmp}/primeclock-v26-gate-c-candidate"
          - --zip
        expected_stdout: "candidate package directory:"
      - cwd: research/experiments/critical_radius_birth_dynamics
        command:
          - "{python}"
          - candidate_bundle.py
          - --profile
          - v2_6_gate_c_candidate
          - --check
          - "{tmp}/primeclock-v26-gate-c-candidate/PrimeClock-v2.6-gate-c-candidate-v0.1"
        expected_stdout: "OK:"
      - cwd: "{tmp}/primeclock-v26-gate-c-candidate"
        command:
          - unzip
          - -t
          - PrimeClock-v2.6-gate-c-candidate-v0.1.zip
        expected_stdout: "No errors detected"
      - cwd: "{tmp}/primeclock-v26-gate-c-candidate/PrimeClock-v2.6-gate-c-candidate-v0.1"
        command:
          - "{python}"
          - research/experiments/critical_radius_birth_dynamics/check_v2_6_gate_c_candidate.py
        expected_stdout: "check_v2_6_gate_c_candidate: checks=9, failed=0, gate_c=candidate_ready, public_theorem=defer"
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_gate_c_candidate.py
          - --bundle-root
          - "{tmp}/primeclock-v26-gate-c-candidate/PrimeClock-v2.6-gate-c-candidate-v0.1"
          - --zip
          - "{tmp}/primeclock-v26-gate-c-candidate/PrimeClock-v2.6-gate-c-candidate-v0.1.zip"
          - --reproducible-zip
          - --negative-tests
        expected_stdout: "check_v2_6_gate_c_candidate: checks=9, failed=0, gate_c=candidate_ready, public_theorem=defer"
  quick:
    description: Minimal v2.6 Gate C proof-note candidate check
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_single_gap_theorem_note_draft.py
