candidate_id: prc_v2_6_gate_r_starter
status: source_only_gate_r_starter
public_release: false
base_public_release: v2.5.0-prc-public-theorem
goal: >
  Start v2.6 as a source-only Gate R research line while keeping the v2.5 public
  theorem release fixed. The current main route is special point obstruction:
  forbidden special remainders, central endpoint obstruction, and mod 6 ancestry
  diagnostics. B8 feasibility remains a separate deferred route.
readiness:
  starter_baseline_completion_percent: "35"
  current_theorem_note_draft_readiness_percent: "98-99"
  reusable_workflow_percent: "90"
  estimated_slices_to_gate_r_checkpoint: "0.2-0.3"

gates:
  v2-6-feasibility:
    description: v2.6 B8 feasibility and route-start audit
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_b8_feasibility.py
        expected_stdout: "check_v2_6_b8_feasibility: checks=8, failed=0, mode=read_only"
  v2-6-boundary:
    description: v2.6 boundary audit for non-claims and v2.5 public release separation
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_b8_feasibility.py
          - --boundary-only
        expected_stdout: "check_v2_6_b8_feasibility: checks=6, failed=0, mode=read_only"
  v2-6-special-point-obstruction:
    description: v2.6 special point obstruction Gate R audit
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_special_point_obstruction.py
        expected_stdout: "check_v2_6_special_point_obstruction: checks=10, failed=0, route=continue_special_point_obstruction, mod6_theorem=defer"
  v2-6-special-point-lemma-formalization:
    description: v2.6 special point lemma formalization readiness audit
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_special_point_lemma_formalization.py
        expected_stdout: "check_v2_6_special_point_lemma_formalization: checks=8, failed=0, route=formalize_special_point_lemmas, proof_status=candidate"
  v2-6-special-point-gate-r-review:
