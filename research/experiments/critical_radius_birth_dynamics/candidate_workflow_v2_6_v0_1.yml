candidate_id: prc_v2_6_gate_r_starter
status: source_only_gate_r_starter
public_release: false
base_public_release: v2.5.0-prc-public-theorem
goal: >
  Start v2.6 as a source-only Gate R research line while keeping the v2.5 public
  theorem release fixed. The current main route is special point obstruction:
  forbidden special remainders, central endpoint obstruction, and mod 6 ancestry
  diagnostics. B8 feasibility remains a separate deferred route.
readiness:
  current_completion_percent: "35"
  reusable_workflow_percent: "90"
  estimated_slices_to_target: "1"

gates:
  v2-6-feasibility:
    description: v2.6 B8 feasibility and route-start audit
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_b8_feasibility.py
        expected_stdout: "check_v2_6_b8_feasibility: checks=8, failed=0"
  v2-6-boundary:
    description: v2.6 boundary audit for non-claims and v2.5 public release separation
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_b8_feasibility.py
          - --boundary-only
        expected_stdout: "check_v2_6_b8_feasibility: checks=6, failed=0"
  v2-6-special-point-obstruction:
    description: v2.6 special point obstruction Gate R audit
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_special_point_obstruction.py
        expected_stdout: "check_v2_6_special_point_obstruction: checks=10, failed=0, route=continue_special_point_obstruction, mod6_theorem=defer"
  v2-6-special-point-lemma-formalization:
    description: v2.6 special point lemma formalization readiness audit
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_special_point_lemma_formalization.py
        expected_stdout: "check_v2_6_special_point_lemma_formalization: checks=8, failed=0, route=formalize_special_point_lemmas, proof_status=candidate"
  v2-6-special-point-gate-r-review:
    description: v2.6 special point Gate R review readiness audit
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_special_point_gate_r_review.py
        expected_stdout: "check_v2_6_special_point_gate_r_review: checks=7, failed=0, gate_r=continue_special_point_obstruction"
  v2-6-endpoint-distance-proof-obligation:
    description: v2.6 endpoint-distance proof-obligation readiness audit
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_endpoint_distance_proof_obligation.py
        expected_stdout: "check_v2_6_endpoint_distance_proof_obligation: checks=8, failed=0, proof_status=candidate, public_theorem=defer"
  v2-6-gate-r-local-first-process:
    description: v2.6 Gate R local-first process boundary audit
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_gate_r_local_first_process.py
        expected_stdout: "check_v2_6_gate_r_local_first_process: checks=5, failed=0, gate_r=local_first"
  v2-6-special-point-theorem-note-decision:
    description: v2.6 special point theorem-note promote/defer decision audit
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_special_point_theorem_note_decision.py
        expected_stdout: "check_v2_6_special_point_theorem_note_decision: checks=7, failed=0, decision=defer_full_theorem_note"
  quick:
    description: Lightweight v2.6 Gate R starter checks; does not build a B8 full graph
    commands:
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_b8_feasibility.py
        expected_stdout: "check_v2_6_b8_feasibility: checks=8, failed=0"
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_special_point_obstruction.py
        expected_stdout: "check_v2_6_special_point_obstruction: checks=10, failed=0, route=continue_special_point_obstruction, mod6_theorem=defer"
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_special_point_lemma_formalization.py
        expected_stdout: "check_v2_6_special_point_lemma_formalization: checks=8, failed=0, route=formalize_special_point_lemmas, proof_status=candidate"
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_special_point_gate_r_review.py
        expected_stdout: "check_v2_6_special_point_gate_r_review: checks=7, failed=0, gate_r=continue_special_point_obstruction"
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_endpoint_distance_proof_obligation.py
        expected_stdout: "check_v2_6_endpoint_distance_proof_obligation: checks=8, failed=0, proof_status=candidate, public_theorem=defer"
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_gate_r_local_first_process.py
        expected_stdout: "check_v2_6_gate_r_local_first_process: checks=5, failed=0, gate_r=local_first"
      - cwd: research
        command:
          - "{python}"
          - experiments/critical_radius_birth_dynamics/check_v2_6_special_point_theorem_note_decision.py
        expected_stdout: "check_v2_6_special_point_theorem_note_decision: checks=7, failed=0, decision=defer_full_theorem_note"
